location /backend/ {
  proxy_pass https://slyvnzxvkyqtiyawethv.supabase.co/;
  proxy_ssl_server_name on;
  proxy_set_header Host slyvnzxvkyqtiyawethv.supabase.co;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header Authorization $http_authorization;
  proxy_set_header apikey $http_apikey;
  proxy_set_header x-client-info $http_x_client_info;
  proxy_set_header content-type $http_content_type;
}

location = /backend/auth/v1/token {
  proxy_pass https://slyvnzxvkyqtiyawethv.supabase.co/auth/v1/token;
  proxy_ssl_server_name on;
  proxy_set_header Host slyvnzxvkyqtiyawethv.supabase.co;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header Authorization $http_authorization;
  proxy_set_header apikey $http_apikey;
  proxy_set_header x-client-info $http_x_client_info;
  proxy_set_header content-type $http_content_type;
}
